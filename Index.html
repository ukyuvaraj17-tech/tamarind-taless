<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080604;font-family:'Cormorant Garamond',Georgia,serif}
.page-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.45em;text-transform:uppercase;color:rgba(255,248,220,.3);text-align:center;padding:28px 0 8px}
.page-sub{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:rgba(255,248,220,.2);text-align:center;padding-bottom:20px}
.section-title{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:rgba(200,160,60,.4);padding:14px 16px 10px;border-top:1px solid rgba(255,255,255,.05)}
.grid{display:flex;flex-direction:column;gap:2px;padding:0 2px 2px}
.opt{overflow:hidden;cursor:pointer;transition:filter .15s}
.opt:hover{filter:brightness(1.06)}
.ohdr{display:flex;align-items:center;gap:8px;padding:13px 16px}
.onum{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.28em;text-transform:uppercase;opacity:.35;min-width:22px;flex-shrink:0}
.oname{font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;flex:1;min-width:0}
.osub{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;opacity:.42;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.osw{display:flex;gap:3px;flex-shrink:0}
.sw{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.prev{display:none;padding-bottom:16px}
.prev.open{display:block}
.mnav{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid}
.mlogo{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400}
.mtag{font-family:'Cinzel',serif;font-size:5.5px;letter-spacing:.32em;text-transform:uppercase;margin-top:1px}
.mlinks{display:flex;gap:12px}
.mlink{font-family:'Cinzel',serif;font-size:6px;letter-spacing:.16em;text-transform:uppercase;opacity:.45}
.mhero{padding:26px 14px 20px;text-align:center}
.mlbl{font-family:'Cinzel',serif;font-size:6px;letter-spacing:.32em;text-transform:uppercase;margin-bottom:9px;opacity:.6}
.mh1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;line-height:.93;margin-bottom:9px}
.msub{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;opacity:.38;margin-bottom:14px}
.mbtns{display:flex;gap:6px;justify-content:center}
.mbtn{font-family:'Cinzel',serif;font-size:6px;letter-spacing:.15em;text-transform:uppercase;padding:7px 14px;border:none;cursor:pointer}
.mdiv{width:26px;height:1px;margin:0 auto 10px;opacity:.38}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:12px 14px}
.card{overflow:hidden}
.cimg{height:80px;display:flex;align-items:flex-end;padding:7px;position:relative}
.cimg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,transparent 55%)}
.ccat{font-family:'Cinzel',serif;font-size:5px;letter-spacing:.13em;text-transform:uppercase;opacity:.48;position:relative;z-index:2;display:block}
.cname{font-family:'Cormorant Garamond',serif;font-size:11px;position:relative;z-index:2;line-height:1.1;display:block;margin-top:1px}
.cbody{padding:7px 8px}
.cprice{font-family:'Cormorant Garamond',serif;font-size:12px}
.badge{font-family:'Cinzel',serif;font-size:5px;letter-spacing:.09em;padding:2px 5px;text-transform:uppercase;position:absolute;top:5px;left:5px;z-index:3}
.cbtns{display:flex;gap:4px;margin-top:5px}
.cbtn{font-family:'Cinzel',serif;font-size:5px;letter-spacing:.1em;text-transform:uppercase;padding:4px 6px;border:none;cursor:pointer}
.strip{padding:7px 14px;overflow:hidden}
.striptxt{font-family:'Cinzel',serif;font-size:5px;letter-spacing:.22em;text-transform:uppercase;white-space:nowrap;opacity:.68}
.stats{display:grid;grid-template-columns:repeat(4,1fr);padding:10px 14px}
.stat{text-align:center;padding:7px 0}
.statnum{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;line-height:1}
.statlbl{font-family:'Cinzel',serif;font-size:5px;letter-spacing:.14em;text-transform:uppercase;opacity:.38;margin-top:2px}
.pal{display:flex;gap:4px;padding:9px 14px;flex-wrap:wrap;align-items:center}
.pi{display:flex;flex-direction:column;align-items:center;gap:2px}
.pb{width:36px;height:22px;border-radius:2px}
.pn{font-family:'Cinzel',serif;font-size:4.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.35}
.ph{font-size:6.5px;font-family:monospace;opacity:.22}
.qstrip{padding:9px 14px;text-align:center}
.qt{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;font-weight:300;opacity:.55;line-height:1.5}
.sel-btn{background:transparent;font-family:'Cinzel',serif;font-size:6px;letter-spacing:.18em;text-transform:uppercase;padding:6px 12px;cursor:pointer;margin-left:auto;border:none}
.selected-bar{display:none;position:fixed;bottom:0;left:0;right:0;padding:14px 24px;display:none;align-items:center;justify-content:space-between;z-index:9999;border-top:1px solid rgba(255,255,255,.1)}
.selected-bar.show{display:flex}
</style>

      <div class="stat" style="border-right:1px solid ${p.acc2}18"><div class="statnum" style="color:${p.acc2}">228</div><div class="statlbl" style="color:${lightText}80">Pieces</div></div>
      <div class="stat" style="border-right:1px solid ${p.acc2}18"><div class="statnum" style="color:${p.acc2}">27K</div><div class="statlbl" style="color:${lightText}80">Community</div></div>
      <div class="stat" style="border-right:1px solid ${p.acc2}18"><div class="statnum" style="color:${p.acc2}">5+</div><div class="statlbl" style="color:${lightText}80">Traditions</div></div>
      <div class="stat"><div class="statnum" style="color:${p.acc2}">100%</div><div class="statlbl" style="color:${lightText}80">India</div></div>
    </div>
    <div style="background:${p.stripbg};padding:9px 14px;text-align:center"><div style="font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:${p.text};opacity:.88">Objects that carry centuries — curated for those who understand.</div></div>
    <div class="pal" style="background:${p.bg}">
      <div class="pi"><div class="pb" style="background:${p.bg};border:1px solid rgba(128,128,128,.2)"></div><div class="pn" style="color:${p.acc2}">Base</div><div class="ph" style="color:${p.acc2}">${p.bg}</div></div>
      <div class="pi"><div class="pb" style="background:${p.surf}"></div><div class="pn" style="color:${p.acc2}">Surface</div><div class="ph" style="color:${p.acc2}">${p.surf}</div></div>
      <div class="pi"><div class="pb" style="background:${p.acc1}"></div><div class="pn" style="color:${p.acc2}">Accent Dark</div><div class="ph" style="color:${p.acc2}">${p.acc1}</div></div>
      <div class="pi"><div class="pb" style="background:${p.acc2}"></div><div class="pn" style="color:${p.acc2}">Accent</div><div class="ph" style="color:${p.acc2}">${p.acc2}</div></div>
      <div class="pi"><div class="pb" style="background:${p.acc3}"></div><div class="pn" style="color:${p.acc2}">Light</div><div class="ph" style="color:${p.acc2}">${p.acc3}</div></div>
      <div class="pi"><div class="pb" style="background:${p.text}"></div><div class="pn" style="color:${p.acc2}">Text</div><div class="ph" style="color:${p.acc2}">${p.text}</div></div>
      <button onclick="event.stopPropagation();selectP('${p.id}','${p.name}','${p.acc2}','${p.bg}')" style="background:${p.acc2};color:${p.bg.startsWith('#F')?'#FFF':p.bg};font-family:'Cinzel',serif;font-size:6px;letter-spacing:.16em;text-transform:uppercase;padding:6px 11px;border:none;cursor:pointer;margin-left:auto">Select This</button>
    </div>
  </div>
</div>`;
}

['g1','g2','g3','g4'].forEach((gid,gi)=>{
  const data=[g1,g2,g3,g4][gi];
  const el=document.getElementById(gid);
  data.forEach(p=>{el.innerHTML+=makeCard(p)});
});

function tog(id){
  var el=document.getElementById(id);
  if(!el)return;
  var isOpen=el.classList.contains('open');
  document.querySelectorAll('.prev').forEach(p=>p.classList.remove('open'));
  if(!isOpen){el.classList.add('open');setTimeout(()=>el.parentElement.scrollIntoView({behavior:'smooth',block:'start'}),50);}
}

var selId='',selName='',selAcc='',selBg='';
function selectP(id,name,acc,bg){
  selId=id;selName=name;selAcc=acc;selBg=bg;
  var bar=document.getElementById('sel-bar');
  bar.style.background=bg;
  bar.style.color=acc;
  bar.querySelector('button').style.background=acc;
  bar.querySelector('button').style.color=bg.startsWith('#F')?'#fff':bg;
  document.getElementById('sel-info').style.color=acc;
  document.getElementById('sel-info').textContent='Selected: '+id+' — '+name+' (Tell Claude this code to build)';
  bar.classList.add('show');
}
function copySelected(){
  var txt='Build the full Tamarind Taless website using palette '+selId+' — '+selName;
  try{navigator.clipboard.writeText(txt);}catch(e){}
  alert('Copied to clipboard:\n\n'+txt+'\n\nPaste this in Claude to start building.');
}
</script>
